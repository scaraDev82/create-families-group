<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Groupes - Familles</title>
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="families">
    <main class="container">
      <header class="header-row">
        <h1>Gestion des Groupes</h1>
        <div class="session-box">
          <span id="user-email"></span>
          <button id="logout-btn" type="button">Se déconnecter</button>
        </div>
      </header>

      <nav class="tabs">
        <a class="tab active" href="/index.html">Familles</a>
        <a class="tab" href="/group-editor.html">Éditeur de groupe</a>
        <a class="tab" href="/saved-groups.html">Groupes enregistrés</a>
      </nav>

      <section class="card">
        <h2>Base de données des familles</h2>
        <form id="family-form" class="grid-form">
          <label>
            Nom de famille
            <input type="text" id="lastName" required />
          </label>

          <label>
            Adresse
            <input type="text" id="address" required />
          </label>

          <label>
            Téléphone
            <input type="tel" id="phone" required />
          </label>

          <label>
            Chien
            <select id="hasDog" required>
              <option value="none" selected>aucun</option>
              <option value="in">intérieur</option>
              <option value="out">extérieur</option>
            </select>
          </label>

          <label>
            Chat
            <select id="hasCat" required>
              <option value="none" selected>aucun</option>
              <option value="in">intérieur</option>
              <option value="out">extérieur</option>
            </select>
          </label>

          <button id="family-submit-btn" type="submit">Ajouter famille</button>
          <button id="family-cancel-edit" type="button" class="secondary" style="display: none">Annuler modification</button>
        </form>

        <div class="feedback" id="feedback"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nom</th>
                <th>Adresse</th>
                <th>Téléphone</th>
                <th>Chien</th>
                <th>Chat</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="family-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
