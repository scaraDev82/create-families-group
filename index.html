<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Group Manager - Families</title>
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="families">
    <main class="container">
      <header class="header-row">
        <h1>Family Group Manager</h1>
        <div class="session-box">
          <span id="user-email"></span>
          <button id="logout-btn" type="button">Log out</button>
        </div>
      </header>

      <nav class="tabs">
        <a class="tab active" href="/index.html">Families</a>
        <a class="tab" href="/group-editor.html">Group Editor</a>
        <a class="tab" href="/saved-groups.html">Saved Groups</a>
      </nav>

      <section class="card">
        <h2>Family Database</h2>
        <form id="family-form" class="grid-form">
          <label>
            Last name
            <input type="text" id="lastName" required />
          </label>

          <label>
            Address
            <input type="text" id="address" required />
          </label>

          <label>
            Phone number
            <input type="tel" id="phone" required />
          </label>

          <label>
            Has dog
            <select id="hasDog" required>
              <option value="none" selected>none</option>
              <option value="in">in</option>
              <option value="out">out</option>
            </select>
          </label>

          <label>
            Has cat
            <select id="hasCat" required>
              <option value="none" selected>none</option>
              <option value="in">in</option>
              <option value="out">out</option>
            </select>
          </label>

          <button type="submit">Add family</button>
        </form>

        <div class="feedback" id="feedback"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Last name</th>
                <th>Address</th>
                <th>Phone</th>
                <th>Dog</th>
                <th>Cat</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="family-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
