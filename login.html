<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Groupes - Connexion</title>
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="login">
    <main class="container auth-layout">
      <section class="card auth-card">
        <h1>Gestion des Groupes</h1>
        <p class="muted">Connectez-vous avec votre e-mail. Vous recevrez un lien magique sécurisé.</p>

        <form id="login-form" class="grid-form single-col">
          <label>
            E-mail
            <input id="email" type="email" required placeholder="vous@exemple.com" />
          </label>
          <button type="submit">Envoyer le lien magique</button>
        </form>

        <div class="feedback" id="feedback"></div>
      </section>
    </main>

    <script type="module" src="login.js"></script>
  </body>
</html>
