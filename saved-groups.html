<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Groupes - Groupes enregistrés</title>
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="saved-groups">
    <main class="container">
      <header class="header-row">
        <h1>Gestion des Groupes</h1>
        <div class="session-box">
          <span id="user-email"></span>
          <button id="logout-btn" type="button">Se déconnecter</button>
        </div>
      </header>

      <nav class="tabs">
        <a class="tab" href="/index.html">Familles</a>
        <a class="tab" href="/group-editor.html">Éditeur de groupe</a>
        <a class="tab active" href="/saved-groups.html">Groupes enregistrés</a>
      </nav>

      <section class="card">
        <h2>Groupes enregistrés</h2>
        <div class="feedback" id="feedback"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Titre</th>
                <th>Arrivée</th>
                <th>Départ</th>
                <th>Professeurs</th>
                <th>Chauffeurs</th>
                <th>Objectif enfants</th>
                <th>Familles</th>
                <th>Garçons</th>
                <th>Filles</th>
                <th>Total enfants</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="saved-groups-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
