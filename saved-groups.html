<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Manager - Saved Groups</title>
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="saved-groups">
    <main class="container">
      <header class="header-row">
        <h1>Group Manager</h1>
        <div class="session-box">
          <span id="user-email"></span>
          <button id="logout-btn" type="button">Log out</button>
        </div>
      </header>

      <nav class="tabs">
        <a class="tab" href="/index.html">Families</a>
        <a class="tab" href="/group-editor.html">Group Editor</a>
        <a class="tab active" href="/saved-groups.html">Saved Groups</a>
      </nav>

      <section class="card">
        <h2>Saved Groups</h2>
        <div class="feedback" id="feedback"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Arrival</th>
                <th>Departure</th>
                <th>Teachers</th>
                <th>Drivers</th>
                <th>Target Kids</th>
                <th>Families</th>
                <th>Boys</th>
                <th>Girls</th>
                <th>Total Kids</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="saved-groups-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
